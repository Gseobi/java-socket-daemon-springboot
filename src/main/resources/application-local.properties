spring.application.name=java-socket-daemon
spring.main.web-application-type=none

spring.profiles.active=local

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:daemon;MODE=Oracle;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=never

mybatis.mapper-locations=classpath:mapper/*.xml

daemon.nas-ip=127.0.0.1
daemon.poll-interval-ms=2000

daemon.socket.connect-timeout-ms=3000
daemon.socket.read-timeout-ms=30000
daemon.socket.retry-count=3
daemon.socket.jitter-ms=200
daemon.socket.retry-backoff-ms=500

daemon.conf.dir=config/provider

daemon.socket.mock-enabled=true
